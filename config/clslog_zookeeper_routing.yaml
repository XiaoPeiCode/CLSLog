# Zookeeper CLSLog routing config (recorded 2026-06-15)
# Reproduces confidence-based evolutionary log selection experiment.
# Run: python3 CLSLog.py --config ./config/clslog_zookeeper_routing.yaml

dataset_name: Zookeeper
dataset_dir: dataset
bert_model: bert-base-uncased
cache_dir: ./cache_dir/

result_dir: ./results/clslog/zookeeper_routing/

split_method: stratified
test_ratio: 0.2
valid_ratio: 0.1
sample_size: null
random_seed: 42

window_size: 10
step_size: 10
embedding_method: mean
emb_batch_size: 64

use_hdbscan: false

sm_only_mode: true
enable_confidence_routing: true
tune_k_on_valid: true
k: 4
score_threshold: 0.0
confidence_threshold: null

use_siamese_network: true
cl_num_epochs: 20
batch_size: 128
learning_rate: 0.001
eval_split: valid
eval_in_train: true

use_large_model: false
use_cache: true
wandb_mode: disabled

LLM:
  model: gpt-4o-mini
  temperature: 0.01
  top_p: 0.95
  batch_size: 8
  response_format: true
